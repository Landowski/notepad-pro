<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <title>Notepad PRO</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="preload" href="assets/css.css" as="style">
    <link rel="stylesheet" href="assets/css.css">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div id="desktopContent" class="relative flex size-full min-h-screen flex-col bg-white group/design-root overflow-x-hidden" style='font-family: Inter, "Noto Sans", sans-serif;'>
      <div class="layout-container flex h-full grow flex-col">
        <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#dddbe6] px-10 py-3">
          <div class="flex items-center gap-4 text-[#121118]" style="gap: 7px;">
            <div class="size-4" style="width: 24px; height: 24px;">
              <img src="assets/icon.png" />
            </div>
            <h2 id="title" class="text-[#121118] text-lg font-bold leading-tight tracking-[-0.015em] title-bold" style="font-size: 21px; line-height: 1">Notepad PRO</h2>
          </div>
          <div class="flex flex-1 justify-end gap-8">
            <div class="flex gap-2">
              <button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-[#3383ff] text-white text-sm font-bold leading-normal tracking-[0.015em]">
                <span id="install" class="truncate"></span>
              </button>
            </div>
          </div>
        </header>
        <div class="px-40 flex flex-1 justify-center py-5">
          <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
            <div class="@container">
              <div class="flex flex-col gap-6 px-4 py-10 @[480px]:gap-8 @[864px]:flex-row">
                <img src="assets/tela.png" width="440" style="border: 1px solid #d5d5d5" />
                <div class="flex flex-col gap-6 @[480px]:min-w-[400px] @[480px]:gap-8 @[864px]:justify-center">
                  <div class="flex flex-col gap-2 text-left">
                    <h1 id="mainHeading"
                      class="text-[#121118] text-4xl font-black leading-tight tracking-[-0.033em] @[480px]:text-5xl @[480px]:font-black @[480px]:leading-tight @[480px]:tracking-[-0.033em]"
                    >
                    </h1>
                    <h2 id="mainDescription" class="text-[#121118] text-sm font-normal leading-normal @[480px]:text-base @[480px]:font-normal @[480px]:leading-normal">
                    </h2>
                  </div>
                  <button
                    class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 @[480px]:h-12 @[480px]:px-5 bg-[#3383ff] text-white text-sm font-bold leading-normal tracking-[0.015em] @[480px]:text-base @[480px]:font-bold @[480px]:leading-normal @[480px]:tracking-[0.015em]"
                  >
                    <span id="getItNow" class="truncate"></span>
                  </button>
                </div>
              </div>
            </div>
            <div class="flex flex-col gap-10 px-4 py-10 @container">
              <div class="flex flex-col gap-4">
                <h1 id="howItWorks"
                  class="text-[#121118] tracking-light text-[32px] font-bold leading-tight @[480px]:text-4xl @[480px]:font-black @[480px]:leading-tight @[480px]:tracking-[-0.033em] max-w-[720px]"
                >
                </h1>
                <p id="howItWorksDesc" class="text-[#121118] text-base font-normal leading-normal max-w-[720px]">
                </p>
              </div>
              <div class="grid grid-cols-[repeat(auto-fit,minmax(158px,1fr))] gap-3 p-0">
                <div class="flex flex-1 gap-3 rounded-lg border border-[#dddbe6] bg-white p-4 flex-col">
                  <div class="text-[#121118]" data-icon="Clipboard" data-size="24px" data-weight="regular">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-notebook-pen-icon lucide-notebook-pen"><path d="M13.4 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7.4"/><path d="M2 6h4"/><path d="M2 10h4"/><path d="M2 14h4"/><path d="M2 18h4"/><path d="M21.378 5.626a1 1 0 1 0-3.004-3.004l-5.01 5.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/></svg>
                  </div>
                  <div class="flex flex-col gap-1">
                    <h2 id="defineSnippets" class="text-[#121118] text-base font-bold leading-tight"></h2>
                    <p id="defineSnippetsDesc" class="text-[#666] text-sm font-normal leading-normal">
                    </p>
                  </div>
                </div>
                <div class="flex flex-1 gap-3 rounded-lg border border-[#dddbe6] bg-white p-4 flex-col">
                  <div class="text-[#121118]" data-icon="Mouse" data-size="24px" data-weight="regular">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-icon lucide-shield"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
                    </svg>
                  </div>
                  <div class="flex flex-col gap-1">
                    <h2 id="rightClickPaste" class="text-[#121118] text-base font-bold leading-tight"></h2>
                    <p id="rightClickPasteDesc" class="text-[#666] text-sm font-normal leading-normal">
                    </p>
                  </div>
                </div>
                <div class="flex flex-1 gap-3 rounded-lg border border-[#dddbe6] bg-white p-4 flex-col">
                  <div class="text-[#121118]" data-icon="Clock" data-size="24px" data-weight="regular">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock-icon lucide-clock"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
                  </div>
                  <div class="flex flex-col gap-1">
                    <h2 id="saveTime" class="text-[#121118] text-base font-bold leading-tight"></h2>
                    <p id="saveTimeDesc" class="text-[#666] text-sm font-normal leading-normal">
                    </p>
                  </div>
                </div>
              </div>
            </div>
            <div class="@container">
              <div class="flex flex-col justify-end gap-6 px-4 py-10 @[480px]:gap-8 @[480px]:px-10 @[480px]:py-20">
                <div class="flex flex-col gap-2 text-center">
                  <h1 id="readyHeading"
                    class="text-[#121118] tracking-light text-[32px] font-bold leading-tight @[480px]:text-4xl @[480px]:font-black @[480px]:leading-tight @[480px]:tracking-[-0.033em] max-w-[720px]" style="align-self: center;"
                  >
                  </h1>
                  <p id="readyDesc" class="text-[#121118] text-base font-normal leading-normal max-w-[720px"></p>
                </div>
                <div class="flex flex-1 justify-center">
                  <div class="flex justify-center">
                    <button
                      class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 @[480px]:h-12 @[480px]:px-5 bg-[#3383ff] text-white text-sm font-bold leading-normal tracking-[0.015em] @[480px]:text-base @[480px]:font-bold @[480px]:leading-normal @[480px]:tracking-[0.015em] grow"
                    >
                      <span id="getStarted" class="truncate"></span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <footer class="flex justify-center">
          <div class="flex max-w-[960px] flex-1 flex-col">
            <footer class="flex flex-col gap-6 px-5 py-10 text-center @container">
              <div class="flex flex-wrap items-center justify-center gap-6 @[480px]:flex-row @[480px]:justify-around">
                <a id="privacyPolicy" class="text-[#666] text-base font-normal leading-normal min-w-40" href="privacy">Privacy Policy</a>
                <a class="text-[#666] text-base font-normal leading-normal min-w-40" href="#">landowskiapps@gmail.com</a>
              </div>
            </footer>
          </div>
        </footer>
      </div>
    </div>

    <div id="mobileContent" class="flex flex-col items-center justify-center min-h-screen bg-white px-4" style="display: none; font-family: Inter, 'Noto Sans', sans-serif;">
      <div class="text-center max-w-md">
        <div class="mb-8">
          <div class="flex items-center justify-center gap-2 mb-4">
            <div class="size-8">
              <img src="assets/icon.png" alt="Notepad PRO" />
            </div>
            <h1 class="text-2xl font-bold text-[#121118]">Notepad PRO</h1>
          </div>
        </div>
        
        <div class="bg-[#f8f7fc] rounded-lg p-6 mb-6">
          <div class="text-6xl mb-4">💻</div>
          <h2 id="mobileTitle" class="text-xl font-bold text-[#121118] mb-3"></h2>
          <p id="mobileMessage" class="text-[#666] text-base leading-relaxed">
          </p>
        </div>
        
        <div class="text-center">
          <p class="text-sm text-[#666]">
          </p>
        </div>
      </div>
    </div>

    <script src="assets/js.js"></script>
  </body>

</html>
